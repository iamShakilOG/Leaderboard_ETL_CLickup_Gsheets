name: Leaderboard ETL

on:
  schedule:
    - cron: "15 3 */3 * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run the ETL manually"
        required: false
        default: false
        type: boolean

jobs:
  run-etl:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write Google credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ.get("GOOGLE_SERVICE_ACCOUNT_JSON", "").strip()
          if not raw:
              raise SystemExit("GOOGLE_SERVICE_ACCOUNT_JSON is empty or missing")

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(f"GOOGLE_SERVICE_ACCOUNT_JSON is not valid JSON: {exc}") from exc

          required = ["type", "project_id", "private_key", "client_email"]
          missing = [key for key in required if not data.get(key)]
          if missing:
              raise SystemExit(f"GOOGLE_SERVICE_ACCOUNT_JSON is missing required keys: {missing}")

          path = Path("secrets/service-account.json")
          path.parent.mkdir(parents=True, exist_ok=True)
          path.write_text(json.dumps(data, indent=2), encoding="utf-8")
          print("Google credentials JSON written successfully.")
          PY

      - name: Validate Google credentials JSON
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("secrets/service-account.json")
          raw = path.read_text(encoding="utf-8").strip()
          if not raw:
              raise SystemExit("service-account.json was created empty")

          data = json.loads(raw)
          required = ["type", "project_id", "private_key", "client_email"]
          missing = [key for key in required if not data.get(key)]
          if missing:
              raise SystemExit(f"service-account.json is missing required keys: {missing}")

          print("Google credentials JSON looks valid.")
          PY

      - name: Run ETL
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_LIST_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ./secrets/service-account.json
          DELIVERY_SHEET_KEY: ${{ secrets.DELIVERY_SHEET_KEY }}
          START_DATE: ${{ secrets.START_DATE }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_run || 'false' }}
        run: python Leaderboard_generate_from_clickup_and_charter.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: leaderboard-etl-logs
          path: |
            logs/
            *_processing_failures.csv
          if-no-files-found: ignore
